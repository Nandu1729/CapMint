user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        location /health {
            return 200 '{"status":"healthy"}';
            add_header Content-Type application/json;
        }

        # 1. Auth Service Route Map
        location /api/v1/auth/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://auth-service:8081;
        }

        # 2. CPQ Service Route Map
        location /api/v1/budgets/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://cpq-service:8082;
        }

        # 3. Mint Service Route Map
        location /api/v1/qr/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://mint-service:8083;
        }

        # 4. Resolver Service Route Map (GS1 Digital Link canonical redirection)
        location /01/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://resolver-service:8084;
        }

        # 5. Transparency Log Route Map
        location /log/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://transparency-service:8085;
        }

        # 6. Verification / Revocation Route Map
        location /api/v1/verify/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://verification-service:8086;
        }

        location /api/v1/revocation/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://verification-service:8086;
        }

        # 7. Integration Service Route Map
        location /api/v1/integrations/ {
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://integration-service:8087;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
