<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CapMint — Backend Developer Playground</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    html {
      box-sizing: border-box;
      overflow-y: scroll;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .header-bar {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 20px 40px;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-bar h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      color: #38bdf8;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-bar p {
      margin: 5px 0 0 0;
      color: #94a3b8;
      font-size: 14px;
    }
    .server-badge {
      background: #0284c7;
      color: #ffffff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #0ea5e9;
    }
    /* Customize Swagger UI theme to dark mode */
    .swagger-ui {
      filter: invert(88%) hue-rotate(180deg);
      background: #f1f5f9;
      padding: 20px;
    }
    .swagger-ui .topbar {
      display: none;
    }
    .playground-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="header-bar">
    <div>
      <h1>🍃 CapMint Core API Playground</h1>
      <p>Interactive API Console & OpenAPI Contract Testing Client</p>
    </div>
    <div class="server-badge">Local Gateway: http://localhost:8000</div>
  </div>

  <div class="playground-container">
    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" charset="UTF-8"> </script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" charset="UTF-8"> </script>
  <script>
    window.onload = function() {
      // Build a system that defines the local Nginx proxy server as the primary server target
      const ui = SwaggerUIBundle({
        url: "../api/openapi/openapi-local.yaml",
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        onComplete: function() {
          // Set server URL select option default if needed
        }
      });
      window.ui = ui;
    };
  </script>
</body>
</html>
